server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: user-auth-service
              uri: lb://user-auth-service
              predicates:
                - Path=/api/v1/auth/**,api/v1/admin/registered-users/**

            - id: user-profile-service
              uri: lb://user-profile-service
              predicates:
                - Path=/api/v1/user-profile/**

            - id: period-log-service
              uri: lb://period-log-service
              predicates:
                - Path=/api/v1/period-logs/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

logging:
  level:
    org.springframework.cloud.gateway: TRACE
